name: 機能要求
description: 新機能・改善の提案
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        機能提案ありがとうございます。以下の項目を記入してください。

  - type: input
    id: summary
    attributes:
      label: 機能の概要
      description: 何を実現したいか一言で
      placeholder: 例）カードにコメント機能を追加したい
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 背景・動機
      description: なぜこの機能が必要か、どんな課題を解決するか
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 提案する解決策
      description: 具体的にどう実装・UX を設計するか（案がある場合）
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: 受け入れ条件
      description: この機能が完了したとみなす条件（箇条書き推奨）
      placeholder: |
        - [ ] カードモーダルにコメント入力欄が表示される
        - [ ] コメントが保存・表示される
        - [ ] コメントを削除できる
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: 優先度
      options:
        - 高
        - 中
        - 低
    validations:
      required: true
